<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">feishu-flow-kit table schema review share card</title>
  <desc id="desc">A share-card style visual for feishu-flow-kit showing the table schema review flow, strongest raw hints, review warnings, and the shortest verification loop before enabling live writes.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="48" x2="1348" y2="852" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111E"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101A2C"/>
      <stop offset="1" stop-color="#0B1323"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#030712"/>
  <circle cx="1254" cy="122" r="184" fill="#2563EB" fill-opacity="0.16"/>
  <circle cx="226" cy="804" r="236" fill="#14B8A6" fill-opacity="0.10"/>

  <rect x="52" y="40" width="1336" height="820" rx="32" fill="url(#bg)" stroke="#1E293B" filter="url(#shadow)"/>

  <rect x="92" y="82" width="202" height="40" rx="20" fill="#0F172A" stroke="#1D4ED8"/>
  <circle cx="118" cy="102" r="6" fill="#22C55E"/>
  <text x="134" y="108" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15">release-ready visual asset</text>

  <text x="92" y="176" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">/table schema review share card</text>
  <text x="92" y="220" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">feishu-flow-kit</text>
  <text x="92" y="264" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="22">A smaller repo-front asset for README hero sections, issue links, setup notes, and social preview crops.</text>

  <rect x="92" y="312" width="124" height="6" rx="3" fill="url(#hero)"/>

  <rect x="92" y="350" width="600" height="204" rx="28" fill="url(#hero)"/>
  <rect x="116" y="376" width="552" height="156" rx="22" fill="#08111E" fill-opacity="0.90"/>
  <text x="144" y="424" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">raw field-list → normalized schema → mapping draft</text>
  <text x="144" y="462" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">reviewWarnings → smallest env override → first live write</text>
  <text x="144" y="506" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="19">Built from the advanced fixture chain so reviewers can see the highest-signal drift before touching `.env`.</text>

  <rect x="730" y="350" width="606" height="204" rx="28" fill="url(#panel)" stroke="#233044"/>
  <text x="762" y="394" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Three hints worth keeping visible</text>
  <text x="762" y="436" fill="#5EEAD4" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">optionCount</text>
  <text x="896" y="436" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">select field is real, not fallback text</text>
  <text x="762" y="474" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rawSemanticType=datetime</text>
  <text x="1034" y="474" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">date mode may be too weak</text>
  <text x="762" y="512" fill="#C4B5FD" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rawSemanticType=duplex_link</text>
  <text x="1042" y="512" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">relation shape still needs a human check</text>

  <rect x="92" y="588" width="398" height="220" rx="28" fill="url(#panel)" stroke="#233044"/>
  <text x="124" y="632" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Quoteable review block</text>
  <text x="124" y="668" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">Compact enough for a PR comment or setup note.</text>
  <text x="124" y="718" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">Status        single_select   optionCount=3</text>
  <text x="124" y="752" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">Deadline      date            rawSemanticType=datetime</text>
  <text x="124" y="786" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">RelatedTasks  linked_record   rawSemanticType=duplex_link</text>

  <rect x="522" y="588" width="392" height="220" rx="28" fill="url(#panel)" stroke="#233044"/>
  <text x="554" y="632" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">reviewWarnings</text>
  <text x="554" y="676" fill="#FCA5A5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">mode-mismatch</text>
  <text x="554" y="708" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18">Deadline still looks like datetime.</text>
  <text x="554" y="744" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">suggestedEnv:</text>
  <text x="554" y="774" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">FEISHU_BITABLE_DUE_FIELD_MODE=datetime</text>

  <rect x="946" y="588" width="390" height="220" rx="28" fill="url(#panel)" stroke="#233044"/>
  <text x="978" y="632" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Fast verification loop</text>
  <text x="978" y="682" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18">1. npm run verify:table-schema-handoff</text>
  <text x="978" y="718" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18">2. read the advanced review block</text>
  <text x="978" y="754" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18">3. apply the smallest env override</text>
  <text x="978" y="790" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18">4. do one controlled live write</text>
</svg>
