<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#bc8cff"/>
    </marker>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0d1117" rx="12"/>

  <!-- Header -->
  <rect width="960" height="48" fill="url(#header-grad)" rx="12"/>
  <rect y="36" width="960" height="12" fill="#161b22"/>
  <text x="20" y="30" fill="#e6edf3" font-size="15" font-weight="700" letter-spacing="0.5">feishu-flow-kit — Webhook Message Lifecycle</text>
  <text x="940" y="30" fill="#8b949e" font-size="11" text-anchor="end">v1.0.3</text>

  <!-- Lane backgrounds -->
  <rect x="0" y="54" width="960" height="486" fill="#0d1117"/>

  <!-- Lane labels -->
  <rect x="8" y="68" width="130" height="28" fill="#1557ff" rx="6"/>
  <text x="73" y="87" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Feishu Cloud</text>

  <rect x="8" y="250" width="130" height="28" fill="#238636" rx="6"/>
  <text x="73" y="269" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">feishu-flow-kit</text>

  <rect x="8" y="432" width="130" height="28" fill="#8b5cf6" rx="6"/>
  <text x="73" y="451" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Feishu APIs</text>

  <!-- Vertical lane separators -->
  <line x1="145" y1="58" x2="145" y2="532" stroke="#21262d" stroke-width="1"/>
  <line x1="810" y1="58" x2="810" y2="532" stroke="#21262d" stroke-width="1"/>

  <!-- Horizontal section dividers -->
  <line x1="148" y1="175" x2="952" y2="175" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="148" y1="390" x2="952" y2="390" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="155" y="172" fill="#484f58" font-size="10">incoming</text>
  <text x="155" y="388" fill="#484f58" font-size="10">outgoing</text>

  <!-- Lifelines (dashed vertical lines) -->
  <line x1="230" y1="68" x2="230" y2="490" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="480" y1="68" x2="480" y2="490" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="730" y1="68" x2="730" y2="490" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ===== SEQUENCE STEPS ===== -->

  <!-- ① User taps Send in Feishu -->
  <rect x="168" y="72" width="124" height="36" fill="#1f2937" rx="6" stroke="#1557ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="85" fill="#e6edf3" font-size="10" text-anchor="middle" font-weight="600">① User sends</text>
  <text x="230" y="98" fill="#8b949e" font-size="9" text-anchor="middle">message in Feishu</text>

  <!-- Arrow: User → Platform -->
  <path d="M 230 108 L 230 128 L 418 128 L 418 148" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <text x="324" y="124" fill="#58a6ff" font-size="9" text-anchor="middle">POST /webhook (im.message.receive_v1)</text>

  <!-- ② URL Verification GET -->
  <rect x="358" y="152" width="120" height="36" fill="#1f2937" rx="6" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="418" y="165" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="600">② URL Verify</text>
  <text x="418" y="178" fill="#8b949e" font-size="9" text-anchor="middle">GET Challenge check</text>

  <!-- Arrow: Verify response -->
  <path d="M 418 188 L 418 205 L 252 205 L 252 220" stroke="#3fb950" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="335" y="201" fill="#3fb950" font-size="9" text-anchor="middle">200 + challenge</text>

  <!-- ③ Signature Verification -->
  <rect x="358" y="224" width="120" height="36" fill="#1f2937" rx="6" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="418" y="237" fill="#f0883e" font-size="10" text-anchor="middle" font-weight="600">③ Signature</text>
  <text x="418" y="250" fill="#8b949e" font-size="9" text-anchor="middle">HMAC-SHA256 check</text>

  <!-- Arrow: Event → Parse -->
  <path d="M 480 268 L 542 268" stroke="#bc8cff" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <text x="511" y="264" fill="#bc8cff" font-size="9" text-anchor="middle">parse event</text>

  <!-- ④ Event Parsing -->
  <rect x="548" y="250" width="140" height="36" fill="#1f2937" rx="6" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="618" y="263" fill="#bc8cff" font-size="10" text-anchor="middle" font-weight="600">④ Parse Event</text>
  <text x="618" y="276" fill="#8b949e" font-size="9" text-anchor="middle">extract msg / tenant / lang</text>

  <!-- Arrow: Parse → Route -->
  <path d="M 618 286 L 618 306" stroke="#bc8cff" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <text x="630" y="300" fill="#bc8cff" font-size="9">route</text>

  <!-- ⑤ Command Router -->
  <rect x="548" y="310" width="140" height="44" fill="#2d1f6e" rx="6" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="618" y="325" fill="#c9b8ff" font-size="11" text-anchor="middle" font-weight="700">⑤ Command Router</text>
  <text x="618" y="340" fill="#8b949e" font-size="9" text-anchor="middle">/doc /table /todo /help /ping /poll</text>

  <!-- Arrow: Router → Workflow -->
  <path d="M 618 354 L 618 374" stroke="#f0883e" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>
  <text x="630" y="368" fill="#f0883e" font-size="9">execute</text>

  <!-- ⑥ Workflow Executor -->
  <rect x="548" y="378" width="140" height="36" fill="#1f2937" rx="6" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="618" y="391" fill="#f0883e" font-size="10" text-anchor="middle" font-weight="600">⑥ Workflow</text>
  <text x="618" y="404" fill="#8b949e" font-size="9" text-anchor="middle">i18n · retry · draft builder</text>

  <!-- Arrow: Workflow → API adapter -->
  <path d="M 668 396 L 700 396" stroke="#f0883e" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>
  <text x="684" y="392" fill="#f0883e" font-size="9">call</text>

  <!-- ⑦ Retry Logic -->
  <rect x="705" y="378" width="100" height="36" fill="#1f2937" rx="6" stroke="#f0883e" stroke-width="1" stroke-dasharray="3,2" filter="url(#shadow)"/>
  <text x="755" y="391" fill="#f0883e" font-size="10" text-anchor="middle">⑦ Retry</text>
  <text x="755" y="404" fill="#8b949e" font-size="9" text-anchor="middle">429 · 5xx · 99991661</text>

  <!-- Arrow: Retry → API call to Feishu APIs -->
  <path d="M 730 396 L 730 436" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <text x="744" y="420" fill="#8b5cf6" font-size="9">Feishu API</text>

  <!-- ⑧ Feishu API call -->
  <rect x="668" y="440" width="124" height="36" fill="#2d1f6e" rx="6" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="453" fill="#c9b8ff" font-size="10" text-anchor="middle" font-weight="700">⑧ Feishu APIs</text>
  <text x="730" y="466" fill="#8b949e" font-size="9" text-anchor="middle">messages · docx · bitable</text>

  <!-- Arrow: API response back -->
  <path d="M 708 440 L 708 428 L 560 428 L 560 418" stroke="#3fb950" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="634" y="424" fill="#3fb950" font-size="9" text-anchor="middle">200 / card reply</text>

  <!-- ⑨ Bot Reply -->
  <rect x="488" y="402" width="130" height="36" fill="#1f2937" rx="6" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="553" y="415" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="600">⑨ Bot Reply</text>
  <text x="553" y="428" fill="#8b949e" font-size="9" text-anchor="middle">Feishu card / doc draft</text>

  <!-- Arrow: Reply to user -->
  <path d="M 480 420 L 252 420 L 252 430" stroke="#1557ff" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <text x="366" y="416" fill="#1557ff" font-size="9" text-anchor="middle">delivered to user</text>

  <!-- /status polling (dashed, optional) -->
  <rect x="18" y="330" width="110" height="26" fill="#161b22" rx="5" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="73" y="347" fill="#484f58" font-size="9" text-anchor="middle">GET /status (polling)</text>
  <path d="M 73 330 L 73 302 L 588 302 L 588 286" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arr)"/>
  <path d="M 588 286 L 588 320 L 115 320 L 115 330" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arr)"/>
  <text x="351" y="298" fill="#484f58" font-size="8" text-anchor="middle">optional monitoring</text>

  <!-- Legend -->
  <rect x="14" y="490" width="932" height="36" fill="#161b22" rx="6"/>
  <circle cx="32" cy="508" r="5" fill="#1557ff"/>
  <text x="44" y="512" fill="#8b949e" font-size="10">Incoming Feishu event</text>
  <circle cx="162" cy="508" r="5" fill="#bc8cff"/>
  <text x="174" y="512" fill="#8b949e" font-size="10">Internal processing</text>
  <circle cx="332" cy="508" r="5" fill="#f0883e"/>
  <text x="344" y="512" fill="#8b949e" font-size="10">Workflow &amp; retry</text>
  <circle cx="474" cy="508" r="5" fill="#8b5cf6"/>
  <text x="486" y="512" fill="#8b949e" font-size="10">Feishu API calls</text>
  <circle cx="634" cy="508" r="5" fill="#3fb950"/>
  <text x="646" y="512" fill="#8b949e" font-size="10">Responses &amp; replies</text>
  <line x1="758" y1="508" x2="778" y2="508" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="788" y="512" fill="#484f58" font-size="10">Optional / monitoring</text>

  <!-- Version tag -->
  <text x="950" y="530" fill="#30363d" font-size="10" text-anchor="end">feishu-flow-kit · webhook sequence · v1.0.3</text>
</svg>
