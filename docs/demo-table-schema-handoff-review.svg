<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">feishu-flow-kit table schema handoff review demo</title>
  <desc id="desc">A visual review asset showing the table schema handoff path from raw Feishu field list to normalized schema to mapping draft, with highlighted review hints for optionCount, datetime formatter drift, and duplex link shape.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#121A2B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="24" fill="url(#bg)"/>
  <circle cx="1140" cy="110" r="180" fill="#1D4ED8" fill-opacity="0.12"/>
  <circle cx="160" cy="620" r="220" fill="#14B8A6" fill-opacity="0.08"/>

  <text x="72" y="92" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">feishu-flow-kit</text>
  <text x="72" y="126" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">/table schema handoff review asset: raw field list → normalized schema → mapping draft</text>

  <rect x="64" y="170" width="1152" height="500" rx="28" fill="url(#panel)" stroke="#1F2937" filter="url(#shadow)"/>

  <rect x="98" y="208" width="250" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="122" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">1. Raw Feishu field list</text>
  <text x="122" y="280" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">examples/feishu-fields-list-response-advanced.json</text>
  <text x="122" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">DateTime / DuplexLink / select options</text>
  <text x="122" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">raw API export kept reviewable</text>

  <rect x="390" y="208" width="250" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="414" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">2. Normalized schema</text>
  <text x="414" y="280" fill="#5EEAD4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">table:normalize-feishu-fields</text>
  <text x="414" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">keeps rawSemanticType</text>
  <text x="414" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">dateFormatter / linkedTableId / optionCount</text>

  <rect x="682" y="208" width="250" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="706" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">3. Mapping draft</text>
  <text x="706" y="280" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">table:mapping-draft --format json</text>
  <text x="706" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">matches + reviewWarnings</text>
  <text x="706" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">suggestedEnv when there is an obvious next move</text>

  <rect x="974" y="208" width="208" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="998" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">4. Review gate</text>
  <text x="998" y="280" fill="#F9A8D4" font-family="Inter, Arial, sans-serif" font-size="18">before touching .env</text>
  <text x="998" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">check warning excerpt</text>
  <text x="998" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">then enable real writes</text>

  <path d="M348 294H386" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M640 294H678" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M932 294H970" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M374 294L362 282" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M374 294L362 306" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M666 294L654 282" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M666 294L654 306" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M958 294L946 282" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M958 294L946 306" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

  <rect x="98" y="422" width="510" height="208" rx="22" fill="#08111F" stroke="#243041"/>
  <text x="122" y="458" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Quoteable advanced excerpt</text>
  <rect x="122" y="480" width="462" height="124" rx="14" fill="#020617" stroke="#1E293B"/>
  <text x="146" y="512" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Status        single_select   optionCount=3</text>
  <text x="146" y="540" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Deadline      date            rawSemanticType=datetime</text>
  <text x="146" y="568" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">dateFormatter yyyy-MM-dd HH:mm</text>
  <text x="146" y="596" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">RelatedTasks  linked_record   rawSemanticType=duplex_link</text>

  <rect x="650" y="422" width="532" height="208" rx="22" fill="#08111F" stroke="#243041"/>
  <text x="674" y="458" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">What the reviewer should notice</text>
  <rect x="674" y="480" width="484" height="124" rx="14" fill="#F8FAFC"/>
  <text x="700" y="514" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">• select field is real, not a text fallback</text>
  <text x="700" y="544" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">• date mode may be too weak if time-of-day matters</text>
  <text x="700" y="574" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">• linked relation shape is duplex_link, not just generic linked_record</text>
  <text x="700" y="604" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">Use this block in setup notes, PR review, and schema handoff comments.</text>

  <rect x="980" y="72" width="236" height="44" rx="22" fill="#0F172A" stroke="#1D4ED8"/>
  <circle cx="1006" cy="94" r="7" fill="#22C55E"/>
  <text x="1024" y="101" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="16">new public review asset</text>
</svg>
