<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">feishu-flow-kit table schema review page snapshot</title>
  <desc id="desc">A single-page visual asset summarizing the table schema review path in feishu-flow-kit, highlighting select option metadata, datetime drift, duplex link shape, review warnings, and the smallest env review loop before enabling live writes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101A2C"/>
      <stop offset="1" stop-color="#0B1323"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1440" height="960" rx="28" fill="url(#bg)"/>
  <circle cx="1248" cy="118" r="190" fill="#2563EB" fill-opacity="0.12"/>
  <circle cx="204" cy="836" r="240" fill="#14B8A6" fill-opacity="0.08"/>

  <rect x="48" y="44" width="1344" height="872" rx="28" fill="#0A1221" stroke="#1E293B" filter="url(#shadow)"/>

  <text x="84" y="104" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">feishu-flow-kit</text>
  <text x="84" y="142" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">/table schema review page</text>
  <text x="84" y="178" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">One compact review surface for raw hints, reviewWarnings, and the smallest env decisions before the first live write.</text>

  <rect x="1120" y="74" width="228" height="46" rx="23" fill="#0F172A" stroke="#1D4ED8"/>
  <circle cx="1148" cy="97" r="7" fill="#22C55E"/>
  <text x="1166" y="104" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="16">review-page asset</text>

  <rect x="84" y="224" width="600" height="286" rx="24" fill="url(#card)" stroke="#233044"/>
  <text x="116" y="268" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Quoteable review block</text>
  <text x="116" y="302" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="17">Small enough for a PR comment. Dense enough to prevent the first easy mistakes.</text>
  <rect x="116" y="326" width="536" height="152" rx="18" fill="#020617" stroke="#1E293B"/>
  <text x="142" y="360" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">List          Status        single_select   optionCount=3</text>
  <text x="142" y="394" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">Due           Deadline      date            rawSemanticType=datetime</text>
  <text x="142" y="428" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">dateFormatter yyyy-MM-dd HH:mm</text>
  <text x="142" y="462" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">LinkedRecords RelatedTasks  linked_record   rawSemanticType=duplex_link</text>

  <rect x="724" y="224" width="624" height="286" rx="24" fill="url(#card)" stroke="#233044"/>
  <text x="756" y="268" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">What this page compresses</text>
  <text x="756" y="306" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">raw field-list response → normalized schema → mapping draft → .env review → first controlled write</text>
  <rect x="756" y="334" width="560" height="128" rx="18" fill="#F8FAFC"/>
  <text x="786" y="372" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="19">• keeps raw hints visible after normalization</text>
  <text x="786" y="404" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="19">• makes reviewWarnings visible without a full walkthrough</text>
  <text x="786" y="436" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="19">• gives one-page context before enabling real writes</text>

  <rect x="84" y="548" width="408" height="300" rx="24" fill="url(#card)" stroke="#233044"/>
  <text x="116" y="592" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Three strongest hints</text>
  <rect x="116" y="618" width="344" height="182" rx="18" fill="#08111F" stroke="#1E293B"/>
  <text x="140" y="654" fill="#5EEAD4" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">optionCount</text>
  <text x="140" y="682" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">select field is real, not a text fallback</text>
  <text x="140" y="722" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">rawSemanticType=datetime</text>
  <text x="140" y="750" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">date mode may be too weak if time-of-day matters</text>
  <text x="140" y="790" fill="#C4B5FD" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">rawSemanticType=duplex_link</text>
  <text x="140" y="818" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">relation shape still deserves human review</text>

  <rect x="526" y="548" width="394" height="300" rx="24" fill="url(#card)" stroke="#233044"/>
  <text x="558" y="592" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">reviewWarnings</text>
  <rect x="558" y="618" width="330" height="182" rx="18" fill="#08111F" stroke="#1E293B"/>
  <text x="584" y="654" fill="#FCA5A5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">mode-mismatch</text>
  <text x="584" y="682" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17">Deadline still looks like datetime</text>
  <text x="584" y="716" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">suggestedEnv:</text>
  <text x="584" y="744" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">FEISHU_BITABLE_DUE_FIELD_MODE=datetime</text>
  <text x="584" y="782" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17">Link-shape review still needs a target-table check.</text>

  <rect x="954" y="548" width="394" height="300" rx="24" fill="url(#card)" stroke="#233044"/>
  <text x="986" y="592" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Fast env review loop</text>
  <rect x="986" y="618" width="330" height="182" rx="18" fill="#F8FAFC"/>
  <text x="1012" y="654" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">1. npm run verify:table-schema-handoff</text>
  <text x="1012" y="690" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">2. read the advanced review block</text>
  <text x="1012" y="726" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">3. apply the smallest env override</text>
  <text x="1012" y="762" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">4. do one controlled live write</text>

  <path d="M694 368H722" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M492 694H524" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M924 694H952" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
</svg>
