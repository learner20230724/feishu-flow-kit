<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">feishu-flow-kit local webhook demo</title>
  <desc id="desc">A visual demo asset showing a Feishu message event flowing through the local webhook server, slash-command parser, and /doc workflow to create a Feishu doc with starter native blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#121A2B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="24" fill="url(#bg)"/>
  <circle cx="1150" cy="100" r="180" fill="#1D4ED8" fill-opacity="0.12"/>
  <circle cx="180" cy="620" r="220" fill="#14B8A6" fill-opacity="0.08"/>

  <text x="72" y="92" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">feishu-flow-kit</text>
  <text x="72" y="126" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">Local webhook → slash command → /doc workflow → Feishu doc create + starter blocks</text>

  <rect x="64" y="170" width="1152" height="480" rx="28" fill="url(#panel)" stroke="#1F2937" filter="url(#shadow)"/>

  <rect x="98" y="208" width="230" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="122" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Feishu event</text>
  <text x="122" y="280" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">im.message.receive_v1</text>
  <text x="122" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">text: /doc weekly launch review</text>
  <text x="122" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">message_id, chat_id, sender_id</text>

  <rect x="370" y="208" width="238" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="394" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Local webhook server</text>
  <text x="394" y="280" fill="#5EEAD4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">GET /healthz   POST /webhook</text>
  <text x="394" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">url_verification</text>
  <text x="394" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">optional signature + replay window</text>

  <rect x="650" y="208" width="238" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="674" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Command surface</text>
  <text x="674" y="280" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">/todo ...   /doc ...</text>
  <text x="674" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">typed parser + normalized event</text>
  <text x="674" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">simple workflow routing</text>

  <rect x="930" y="208" width="252" height="170" rx="22" fill="#0F172A" stroke="#243041"/>
  <text x="954" y="246" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">/doc workflow</text>
  <text x="954" y="280" fill="#F9A8D4" font-family="Inter, Arial, sans-serif" font-size="18">outline → draft reply → doc create</text>
  <text x="954" y="318" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">starter richer blocks:</text>
  <text x="954" y="346" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">heading / bullet / todo / paragraph</text>

  <path d="M328 294H366" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M608 294H646" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M888 294H926" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M354 294L342 282" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M354 294L342 306" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M634 294L622 282" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M634 294L622 306" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M914 294L902 282" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M914 294L902 306" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

  <rect x="98" y="422" width="520" height="188" rx="22" fill="#08111F" stroke="#243041"/>
  <text x="122" y="458" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Mock or local run output</text>
  <rect x="122" y="480" width="472" height="104" rx="14" fill="#020617" stroke="#1E293B"/>
  <text x="142" y="512" fill="#22C55E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">$ FEISHU_MOCK_EVENT_PATH=examples/mock-doc-message-event.json npm run dev</text>
  <text x="142" y="543" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">command: /doc weekly launch review</text>
  <text x="142" y="570" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">draftReply: Created a doc outline for “weekly launch review”</text>

  <rect x="660" y="422" width="522" height="188" rx="22" fill="#08111F" stroke="#243041"/>
  <text x="684" y="458" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Created Feishu doc (starter body)</text>
  <rect x="684" y="480" width="474" height="104" rx="14" fill="#F8FAFC"/>
  <text x="710" y="516" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Weekly Launch Review</text>
  <text x="710" y="545" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">• Goal and launch scope</text>
  <text x="710" y="570" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">☐ Risks to watch  ☑ Demo flow validated</text>

  <rect x="996" y="72" width="220" height="44" rx="22" fill="#0F172A" stroke="#1D4ED8"/>
  <circle cx="1022" cy="94" r="7" fill="#22C55E"/>
  <text x="1040" y="101" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="16">starter repo asset</text>
</svg>
