name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container (no-push diagnostic)
        run: |
          echo "Testing build..."
          docker build --no-cache -f Dockerfile -t testimage:test . || echo "Build may fail (expected if docker not available in runner)"

      - name: Show env
        run: |
          echo "DOCKER_VERSION: $(docker --version 2>&1 || echo 'NOT INSTALLED')"
          echo "BUILDX_VERSION: $(docker buildx version 2>&1 || echo 'NOT INSTALLED')"
