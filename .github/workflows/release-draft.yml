name: Release Draft

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog body for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Remove leading 'v' if present
          VERSION_STR="${VERSION#v}"
          # Escape VERSION_STR for use in grep pattern (dots are already safe in fixed-string grep)
          ESCAPED_VER=$(printf '%s' "$VERSION_STR" | sed 's/[^^]/[&]/g; s/\^/^^/g')
          # Find the version section in CHANGELOG.md and collect lines until the next ## or EOF
          # Using grep -A to get lines after the match, then stop at next ## section
          BODY=$(awk -v version="$VERSION_STR" '
            BEGIN { found=0 }
            /^## \[/ {
              # Check if this section matches our version (handles edge cases around version format)
              if (found) { exit }
              # Extract version inside [ ] and compare
              if (index($0, "[" version "]") > 0) { found=1; next }
            }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | grep -v '^$' | head -30 | sed 's/^/• /')
          if [ -z "$BODY" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: feishu-flow-kit ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
