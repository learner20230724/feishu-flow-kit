version: "3.9"

# ── feishu-flow-kit ──────────────────────────────────────────────────────────
#
# Local full-stack mock for feishu-flow-kit.
#
# Usage:
#   cp .env.example .env        # fill in real credentials (optional for mock mode)
#   docker compose up --build   # starts the bot + mock event replay
#
# In mock mode the bot processes events from examples/mock-message-event.json
# without needing any real Feishu credentials.
#
# For a real deployment remove FEISHU_MOCK_MODE=true and fill in all
# FEISHU_* variables.  See docs/deployment.md (EN) or docs/deployment.zh-CN.md (中文).
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Bot service ────────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feishu-flow-kit
    restart: unless-stopped
    ports:
      - "${FEISHU_WEBHOOK_PORT:-8787}:${FEISHU_WEBHOOK_PORT:-8787}"
    env_file:
      - path: .env
        required: false   # falls back to environment variables below
    environment:
      # ── Feishu credentials (required for real mode) ─────────────────────
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BOT_NAME: ${FEISHU_BOT_NAME:-feishu-flow-kit}
      FEISHU_WEBHOOK_SECRET: ${FEISHU_WEBHOOK_SECRET:-}
      FEISHU_WEBHOOK_PORT: ${FEISHU_WEBHOOK_PORT:-8787}
      # ── Feature toggles ───────────────────────────────────────────────────
      FEISHU_MOCK_MODE: ${FEISHU_MOCK_MODE:-true}
      FEISHU_MOCK_EVENT_PATH: ${FEISHU_MOCK_EVENT_PATH:-examples/mock-message-event.json}
      FEISHU_ENABLE_OUTBOUND_REPLY: ${FEISHU_ENABLE_OUTBOUND_REPLY:-false}
      FEISHU_ENABLE_DOC_CREATE: ${FEISHU_ENABLE_DOC_CREATE:-false}
      FEISHU_ENABLE_TABLE_CREATE: ${FEISHU_ENABLE_TABLE_CREATE:-false}
      # ── Bitable (table mode) ─────────────────────────────────────────────
      FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
      FEISHU_BITABLE_TABLE_ID: ${FEISHU_BITABLE_TABLE_ID:-}
      # ── Field names (customisable per Bitable schema) ───────────────────
      FEISHU_BITABLE_TITLE_FIELD_NAME: ${FEISHU_BITABLE_TITLE_FIELD_NAME:-Title}
      FEISHU_BITABLE_LIST_FIELD_NAME: ${FEISHU_BITABLE_LIST_FIELD_NAME:-List}
      FEISHU_BITABLE_DETAILS_FIELD_NAME: ${FEISHU_BITABLE_DETAILS_FIELD_NAME:-Details}
      FEISHU_BITABLE_OWNER_FIELD_NAME: ${FEISHU_BITABLE_OWNER_FIELD_NAME:-Owner}
      FEISHU_BITABLE_ESTIMATE_FIELD_NAME: ${FEISHU_BITABLE_ESTIMATE_FIELD_NAME:-Estimate}
      FEISHU_BITABLE_DUE_FIELD_NAME: ${FEISHU_BITABLE_DUE_FIELD_NAME:-Due}
      FEISHU_BITABLE_DONE_FIELD_NAME: ${FEISHU_BITABLE_DONE_FIELD_NAME:-Done}
      FEISHU_BITABLE_ATTACHMENT_FIELD_NAME: ${FEISHU_BITABLE_ATTACHMENT_FIELD_NAME:-Attachment}
      FEISHU_BITABLE_LINKED_RECORDS_FIELD_NAME: ${FEISHU_BITABLE_LINKED_RECORDS_FIELD_NAME:-LinkedRecords}
      FEISHU_BITABLE_SOURCE_COMMAND_FIELD_NAME: ${FEISHU_BITABLE_SOURCE_COMMAND_FIELD_NAME:-SourceCommand}
      # ── Field modes ──────────────────────────────────────────────────────
      FEISHU_BITABLE_LIST_FIELD_MODE: ${FEISHU_BITABLE_LIST_FIELD_MODE:-text}
      FEISHU_BITABLE_OWNER_FIELD_MODE: ${FEISHU_BITABLE_OWNER_FIELD_MODE:-text}
      FEISHU_BITABLE_ESTIMATE_FIELD_MODE: ${FEISHU_BITABLE_ESTIMATE_FIELD_MODE:-text}
      FEISHU_BITABLE_DUE_FIELD_MODE: ${FEISHU_BITABLE_DUE_FIELD_MODE:-text}
      FEISHU_BITABLE_DONE_FIELD_MODE: ${FEISHU_BITABLE_DONE_FIELD_MODE:-text}
      FEISHU_BITABLE_ATTACHMENT_FIELD_MODE: ${FEISHU_BITABLE_ATTACHMENT_FIELD_MODE:-text}
      FEISHU_BITABLE_LINK_FIELD_MODE: ${FEISHU_BITABLE_LINK_FIELD_MODE:-text}
      # ── Observability ───────────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${FEISHU_WEBHOOK_PORT:-8787}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - feishu-net

  # ── Optional: local webhook payload sender (mock Feishu → bot) ─────────────
  # Uncomment and run `docker compose run mock-sender` to replay a test event.
  # mock-sender:
  #   image: curlimages/curl:latest
  #   networks:
  #     - feishu-net
  #   entrypoint: ["curl", "-X", "POST", "http://bot:8787/webhook", "-H", "Content-Type: application/json", "-d", "@/payload.json"]
  #   volumes:
  #     - ./examples/mock-message-event.json:/payload.json:ro

networks:
  feishu-net:
    driver: bridge
